
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Necklaces | DY Jewelry Demo Store</title>

  <!-- Dynamic Yield Page Context -->
  <script>
    window.DY = window.DY || {};
    DY.recommendationContext = {
      type: "CATEGORY",
      data: ["necklaces"]
    };
  </script>

  <!-- Dynamic Yield Scripts (EU CDN) -->
  <script src="https://cdn.dynamicyield.com/api/8794518/api_dynamic.js"></script>
  <script src="https://cdn.dynamicyield.com/api/8794518/api_static.js"></script>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background: #0b0f17;
      color: #e5e7eb;
    }
    header {
      background: rgba(11,15,23,.8);
      border-bottom: 1px solid rgba(255,255,255,.1);
      padding: 16px 24px;
    }
    nav a {
      margin-right: 16px;
      color: #9ca3af;
      text-decoration: none;
    }
    nav a:hover {
      color: #fff;
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px;
    }
    h1 {
      margin-top: 0;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-top: 24px;
    }
    .card {
      background: #111827;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 14px;
      padding: 16px;
    }
    .price {
      font-weight: 700;
      margin: 8px 0;
    }
    button {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      background: #f59e0b;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover {
      background: #fbbf24;
    }
    .toast {
      position: fixed;
      bottom: 16px;
      right: 16px;
      background: #111827;
      border: 1px solid rgba(255,255,255,.1);
      padding: 12px 14px;
      border-radius: 12px;
      opacity: 0;
      transition: opacity .2s ease;
    }
    .toast.show {
      opacity: 1;
    }
  </style>
</head>

<body>
  <header>
    <nav>
      <a href="index.html">Home</a>
      <a href="necklaces.html">Necklaces</a>
    </nav>
  </header>

  <main class="container">
    <h1>Necklaces</h1>
    <p>Explore our necklace collection (CATEGORY context).</p>

    <div class="grid">
      
      <div class="card">
        <h3>Gold Chain Necklace</a>
        </h3>
        <div class="price">€39</div>
      
        product-necklace-001.html<button>
          View product
        </button></a>
      </div>

      <div class="card">
        <h3>Silver Pendant Necklace</h3>
        <div class="price">€45</div>
        <button onclick="fireDYEvent('Necklace Click', 'necklace-002')">
          Fire DY Event
        </button>
      </div>
    </div>
  </main>

  <div id="toast" class="toast"></div>

  <script>
    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 2000);
    }

    function fireDYEvent(name, sku) {
      DY.API("event", {
        name: name,
        properties: {
          dyType: "custom-event",
          sku: sku,
          category: "necklaces",
          value: 1
        }
      });
      showToast("DY event sent ✅ (check Network)");
    }
  </script>
</body>
</html>
