
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Gold Chain Necklace | DY Jewelry Demo Store</title>

  <!-- DNS preconnect (optional but recommended) -->
  <link rel="preconnect" href="//cdn.dynamicyield.com">
  <link rel="preconnect" href="//st.dynamicyield.com">
  <link rel="preconnect" href="//rcom.dynamicyield.com">

  <!-- Dynamic Yield Page Context (PRODUCT) -->
  <script>
    window.DY = window.DY || {};
    DY.recommendationContext = {
      type: "PRODUCT",
      data: ["necklace-001"]
    };
  </script>

  <!-- Dynamic Yield Scripts (EU CDN) -->
  <script src="https://cdn.dynamicyield.com/api/8794518/api_dynamic.js" type="text/javascript"></script>
  <script src="https://cdn.dynamicyield.com/api/8794518/api_static.js" type="text/javascript"></script>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background: #0b0f17;
      color: #e5e7eb;
    }
    header {
      background: rgba(11,15,23,.8);
      border-bottom: 1px solid rgba(255,255,255,.1);
      padding: 16px 24px;
    }
    nav a {
      margin-right: 16px;
      color: #9ca3af;
      text-decoration: none;
    }
    nav a:hover {
      color: #fff;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 24px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
    }
    @media (max-width: 900px) {
      .container {
        grid-template-columns: 1fr;
      }
    }
    .image {
      background: #111827;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 16px;
      height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #9ca3af;
    }
    h1 {
      margin-top: 0;
    }
    .price {
      font-size: 22px;
      font-weight: 700;
      margin: 12px 0;
    }
    .description {
      color: #9ca3af;
      line-height: 1.6;
    }
    button {
      margin-top: 20px;
      padding: 14px;
      width: 100%;
      background: #f59e0b;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover {
      background: #fbbf24;
    }
    .toast {
      position: fixed;
      bottom: 16px;
      right: 16px;
      background: #111827;
      border: 1px solid rgba(255,255,255,.1);
      padding: 12px 14px;
      border-radius: 12px;
      opacity: 0;
      transition: opacity .2s ease;
    }
    .toast.show {
      opacity: 1;
    }
  </style>
</head>

<body>
  <header>
    <nav>
      index.htmlHome</a>
      necklaces.htmlNecklaces</a>
    </nav>
  </header>

  <main class="container">
    <div class="image">
      Product Image
    </div>

    <div>
      <h1>Gold Chain Necklace</h1>
      <div class="price">€39</div>

      <p class="description">
        A minimalist gold chain necklace designed for everyday wear.
        This PDP uses <strong>PRODUCT</strong> page context with SKU
        <code>necklace-001</code>.
      </p>

      <button onclick="fireAddToCart()">
        Add to cart (DY Event)
      </button>
    </div>
  </main>

  <div id="toast" class="toast"></div>

  <script>
    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 2000);
    }

    // Simulated Add-to-Cart event (demo-safe)
    function fireAddToCart() {
      DY.API("event", {
        name: "Add To Cart",
        properties: {
          dyType: "add-to-cart-v1",
          productId: "necklace-001",
          quantity: 1,
          value: 39,
          currency: "EUR"
        }
      });
      showToast("Add to Cart event sent ✅");
    }
  </script>
</body>
</html>
